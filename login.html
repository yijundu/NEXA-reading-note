<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — NEXA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="landing.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
</head>
<body class="auth-page">

  <!-- Background -->
  <div class="l-bg">
    <img src="bookshelf.jpg" alt="" class="l-bg-img" onerror="this.style.display='none'">
    <div class="l-bg-overlay"></div>
  </div>

  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <svg width="28" height="28" viewBox="0 0 100 100" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="50" y1="3" x2="50" y2="8" stroke="#F59E0B" stroke-width="3.5"/>
        <line x1="63" y1="6" x2="67" y2="2" stroke="#F59E0B" stroke-width="3.5"/>
        <line x1="37" y1="6" x2="33" y2="2" stroke="#F59E0B" stroke-width="3.5"/>
        <path d="M36 30 C36 20 42 13 50 13 C58 13 64 20 64 30 C64 36 61 40 58 43 L42 43 C39 40 36 36 36 30 Z" stroke="#1B3A5C" stroke-width="3.2"/>
        <line x1="42" y1="43" x2="58" y2="43" stroke="#1B3A5C" stroke-width="3.2"/>
        <line x1="44" y1="48" x2="56" y2="48" stroke="#1B3A5C" stroke-width="3.2"/>
        <line x1="47" y1="53" x2="53" y2="53" stroke="#1B3A5C" stroke-width="3.2"/>
        <path d="M50 57 C44 54 28 53 4 58 L4 86 C28 81 44 82 50 85 Z" stroke="#1B3A5C" stroke-width="3.2"/>
        <path d="M50 57 C56 54 72 53 96 58 L96 86 C72 81 56 82 50 85 Z" stroke="#1B3A5C" stroke-width="3.2"/>
      </svg>
      <span class="auth-logo-text">NEXA</span>
    </div>

    <a href="index.html" class="auth-back">← Back</a>

    <h2 class="auth-title">Welcome back</h2>
    <p class="auth-sub">Sign in to your NEXA workspace.</p>

    <form class="auth-form" id="loginForm" novalidate>
      <div class="auth-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" required>
      </div>
      <div class="auth-error" id="loginError"></div>
      <button type="submit" class="auth-submit" id="loginBtn">Sign In</button>
    </form>

    <p class="auth-switch">No account yet? <a href="signup.html">Create your gallery</a></p>

  </div>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    if (isLoggedIn()) window.location.href = 'app.html';

    const form = document.getElementById('loginForm');
    const err  = document.getElementById('loginError');
    const btn  = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      err.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      const email    = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      try {
        await login(email, password);
        window.location.href = 'app.html';
      } catch (ex) {
        err.textContent = ex.message;
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
